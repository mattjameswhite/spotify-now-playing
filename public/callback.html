<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 12px;
  }
  .msg { font-size: 15px; color: rgba(255,255,255,0.6); }
  .err { color: #e05; font-size: 13px; max-width: 340px; text-align: center; }
</style>
</head>
<body>
<div class="msg" id="msg">Connecting to Spotify…</div>
<div class="err" id="err"></div>
<script>
(async () => {
  const params  = new URLSearchParams(location.search);
  const code    = params.get('code');
  const state   = params.get('state');
  const error   = params.get('error');
  const msgEl   = document.getElementById('msg');
  const errEl   = document.getElementById('err');

  if (error) {
    msgEl.textContent = 'Auth cancelled.';
    errEl.textContent = error;
    setTimeout(() => location.replace('/'), 2500);
    return;
  }

  const savedState = sessionStorage.getItem('spotify_state');
  if (!state || state !== savedState) {
    msgEl.textContent = 'Auth failed.';
    errEl.textContent = 'State mismatch — possible CSRF. Please try again.';
    setTimeout(() => location.replace('/'), 3000);
    return;
  }

  const redirectUri = location.origin + '/callback';

  try {
    const res = await fetch('/api/callback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirectUri })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Token exchange failed');

    localStorage.setItem('sp_access_token',  data.access_token);
    localStorage.setItem('sp_refresh_token', data.refresh_token);
    localStorage.setItem('sp_expires_at',    Date.now() + data.expires_in * 1000);

    sessionStorage.removeItem('spotify_state');
    msgEl.textContent = 'Connected! Redirecting…';
    location.replace('/');
  } catch (e) {
    msgEl.textContent = 'Connection failed.';
    errEl.textContent = e.message;
    setTimeout(() => location.replace('/'), 3000);
  }
})();
</script>
</body>
</html>
